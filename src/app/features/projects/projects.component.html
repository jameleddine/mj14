<section class="py-20 px-6">
  <h2 class="text-3xl font-bold mb-10 text-center">Projects</h2>

  <div class="grid md:grid-cols-2 gap-8">
    <div *ngFor="let project of projects" class=" p-6 rounded-2xl shadow-lg">
      <h3 class="text-xl font-semibold mb-3">{{ project.title }}</h3>

      <p class=" mb-3">
        {{ project.description }}
      </p>

      <p class="text-accent text-sm mb-4">
        {{ project.impact }}
      </p>

      <div class="flex flex-wrap gap-2">
        <span *ngFor="let tech of project.tech"
              class="text-xs bg-gray-800 text-white px-3 py-1 rounded-full">
          {{ tech }}
        </span>
      </div>
    </div>
  </div>
</section>
